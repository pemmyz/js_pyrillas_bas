<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- REQUIRED METADATA for Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pyrillas_bas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TOGGLE BUTTON -->
    <button id="mobile-btn">📱 Fullscreen / Mobile Controls</button>

    <!-- GAME CONTAINER (Wraps the content to be scaled) -->
    <div id="game-container">
        <!-- THE SCREEN: Fixed resolution internal logic (1920x1010) -->
        <div id="screen">
            <!-- Your Game Canvas -->
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <!-- MOBILE TOUCH CONTROLS OVERLAY -->
    <div id="mobile-controls">
        <div id="mobile-dpad">
            <button id="mobile-left" class="mobile-control-btn">◀</button>
            <div class="vertical-controls">
                <button id="mobile-up" class="mobile-control-btn">▲</button>
                <button id="mobile-down" class="mobile-control-btn">▼</button>
            </div>
            <button id="mobile-right" class="mobile-control-btn">▶</button>
        </div>
        <div id="mobile-action">
            <button id="mobile-shoot" class="mobile-control-btn shoot-btn">🎯</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
